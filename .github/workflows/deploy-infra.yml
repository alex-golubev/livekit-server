name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

concurrency:
  group: deploy-infra
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'deploy/compose.yaml,deploy/Caddyfile,deploy/prometheus.yml,deploy/grafana'
          target: /opt/livekit
          strip_components: 1

      - name: Restart infrastructure services
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/livekit
            docker compose up -d caddy livekit-server redis prometheus grafana node-exporter
