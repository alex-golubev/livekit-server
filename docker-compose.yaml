# Local development: LiveKit server only.
# Agent runs on the host via `pnpm dev`.
#
# Usage:
#   docker compose up
#
# Then in agent/:
#   cp .env.example .env # fill in GOOGLE_API_KEY and match keys below
#   pnpm dev

services:
  livekit-server:
    image: livekit/livekit-server:v1.9.11
    command: --config /etc/livekit.yaml --dev
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - '7880:7880/tcp'
      - '7881:7881/tcp'
      - '3478:3478/udp'
      - '50000-50060:50000-50060/udp'
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:7880 || exit 1
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 3s
