# Local development LiveKit config.
# --dev flag enables single-node mode without Redis and TLS.

port: 7880
bind_addresses:
  - ''

rtc:
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false
  tcp_port: 7881

keys:
  devkey: secret

room:
  empty_timeout: 300
  max_participants: 10

logging:
  level: info
